    </script>

    <script>
        // Global Variables
        let allQuestions = [];
        let currentTestQuestions = [];
        let timerInterval;
        let timeRemaining = 600; // 10 minutes in seconds
        let testSubmitted = false;

        // --- PARSER LOGIC ---
        function parseQuestions() {
            const rawText = document.getElementById('raw-questions').textContent;
            const lines = rawText.split('\n');
            let questions = [];
            let currentQ = null;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                if (line.includes('GNS 103:') || line.includes('TIME:')) continue;

                // Match New Question (e.g. "1. Question text" or "211 The acronym")
                let qMatch = line.match(/^(\d+)\.?\s+(.*)/);
                if (qMatch) {
                    if (currentQ && currentQ.options.length > 0) questions.push(currentQ);
                    
                    let qText = qMatch[2];
                    // Clean up weird formatting like "1. 1A newspaper"
                    qText = qText.replace(/^\d+[A-Z]/, (match) => match.charAt(match.length-1));

                    currentQ = { question: qText, options: [], correctIndex: -1 };
                    continue;
                }

                // Match Option (e.g. "(a) option", "A. option", "a. option")
                let optMatch = line.match(/^[\(]?\s*[a-eA-E]\s*[\.\)]\s*(.*)/);
                if (optMatch && currentQ) {
                    let optText = optMatch[1];
                    let isCorrect = optText.includes('+++') || line.includes('+++');
                    optText = optText.replace(/\+\+\+$/, '').trim();

                    currentQ.options.push(optText);
                    if (isCorrect) currentQ.correctIndex = currentQ.options.length - 1;
                    continue;
                }

                // Append multi-line strings
                if (currentQ) {
                    if (currentQ.options.length === 0) {
                        currentQ.question += " " + line;
                    } else {
                        let isCorrect = line.includes('+++');
                        let extraText = line.replace(/\+\+\+$/, '').trim();
                        currentQ.options[currentQ.options.length - 1] += " " + extraText;
                        if(isCorrect) currentQ.correctIndex = currentQ.options.length - 1;
                    }
                }
            }
            if (currentQ && currentQ.options.length > 0) questions.push(currentQ);
            return questions;
        }

        // --- SHUFFLE LOGIC ---
        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        // --- UI LOGIC ---
        function startTest() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('test-screen').style.display = 'block';
            
            // Parse (if not already parsed) and Shuffle
            if(allQuestions.length === 0) {
                allQuestions = parseQuestions();
            }
            
            let shuffled = shuffleArray([...allQuestions]);
            currentTestQuestions = shuffled.slice(0, 60); // Select 60 questions

            renderQuestions(currentTestQuestions);
            
            // Reset and start Timer
            testSubmitted = false;
            timeRemaining = 600;
            updateTimerDisplay();
            clearInterval(timerInterval);
            timerInterval = setInterval(timerTick, 1000);
            window.scrollTo(0, 0);
        }

        function renderQuestions(questions) {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            questions.forEach((q, index) => {
                let letters = ['A', 'B', 'C', 'D', 'E'];
                
                let optionsHTML = q.options.map((opt, optIndex) => `
                    <label class="option-label" id="label-q${index}-o${optIndex}">
                        <input type="radio" name="q${index}" value="${optIndex}" onchange="selectOption(this)">
                        <span><strong>${letters[optIndex]}.</strong> ${opt}</span>
                    </label>
                `).join('');

                container.innerHTML += `
                    <div class="question-card" id="qcard-${index}">
                        <span class="question-number">Question ${index + 1} of 60</span>
                        <div class="question-text">${q.question}</div>
                        <div class="options-container">
                            ${optionsHTML}
                        </div>
                    </div>
                `;
            });
            document.getElementById('submit-btn').style.display = 'block';
        }

        function selectOption(radio) {
            if(testSubmitted) return;
            // Remove 'selected' class from all siblings
            let siblings = document.getElementsByName(radio.name);
            siblings.forEach(sib => {
                sib.parentElement.classList.remove('selected');
            });
            // Add 'selected' to checked one
            radio.parentElement.classList.add('selected');
        }

        function timerTick() {
            timeRemaining--;
            updateTimerDisplay();
            
            if(timeRemaining <= 60) {
                document.getElementById('timer').classList.add('time-warning');
            }
            
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                alert("Time is up! Submitting automatically.");
                submitTest();
            }
        }

        function updateTimerDisplay() {
            let m = Math.floor(timeRemaining / 60);
            let s = timeRemaining % 60;
            document.getElementById('timer').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function submitTest() {
            if(testSubmitted) return;
            testSubmitted = true;
            clearInterval(timerInterval);
            document.getElementById('timer').classList.remove('time-warning');

            let score = 0;
            
            // Evaluate answers
            currentTestQuestions.forEach((q, index) => {
                let selected = document.querySelector(`input[name="q${index}"]:checked`);
                let selectedVal = selected ? parseInt(selected.value) : -1;
                
                if (selectedVal === q.correctIndex) {
                    score++;
                }
            });

            // Show Results
            document.getElementById('test-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            let percentage = ((score / 60) * 100).toFixed(1);
            document.getElementById('score-display').innerText = `${score} / 60`;
            
            let msg = percentage >= 70 ? `Excellent job! You scored ${percentage}%` 
                    : percentage >= 50 ? `Good effort! You scored ${percentage}%`
                    : `Keep practicing! You scored ${percentage}%`;
            document.getElementById('score-message').innerText = msg;
            window.scrollTo(0, 0);
        }

        function viewCorrections() {
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('test-screen').style.display = 'block';
            document.getElementById('submit-btn').style.display = 'none'; // Hide submit button
            
            // Show correct/wrong answers
            currentTestQuestions.forEach((q, index) => {
                let selected = document.querySelector(`input[name="q${index}"]:checked`);
                let selectedVal = selected ? parseInt(selected.value) : -1;
                
                // Disable all radios
                let radios = document.getElementsByName(`q${index}`);
                radios.forEach(r => r.disabled = true);
                
                // Highlight correct and wrong answers
                if (selectedVal !== -1 && selectedVal !== q.correctIndex) {
                    document.getElementById(`label-q${index}-o${selectedVal}`).classList.add('wrong');
                }
                
                if (q.correctIndex !== -1) {
                    document.getElementById(`label-q${index}-o${q.correctIndex}`).classList.add('correct');
                }
            });
            window.scrollTo(0, 0);
        }

        function restartTest() {
            startTest();
        }

        // Initialize parser silently in background on load
        window.onload = () => {
            document.getElementById('loader').style.display = 'block';
            setTimeout(() => {
                allQuestions = parseQuestions();
                document.getElementById('loader').style.display = 'none';
            }, 100);
        };
    </script>
